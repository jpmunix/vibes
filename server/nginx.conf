# Vibes Cloud — Nginx Configuration
#
# Place this file at /etc/nginx/sites-available/vibes.conf
# and symlink to /etc/nginx/sites-enabled/vibes.conf
#
# Replace vibes.tudominio.com with your actual domain.
# Replace SSL certificate paths with your actual paths.

server {
    listen 80;
    server_name vibes.tudominio.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name vibes.tudominio.com;

    # SSL — replace with your actual certificate paths
    # For self-signed: openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
    #   -keyout /etc/ssl/vibes/key.pem -out /etc/ssl/vibes/cert.pem
    ssl_certificate     /etc/ssl/vibes/cert.pem;
    ssl_certificate_key /etc/ssl/vibes/key.pem;

    # Max upload size (for project imports)
    client_max_body_size 100M;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Frontend SPA (static files from Vite build)
    location / {
        root /data/vibes/frontend/dist;
        try_files $uri /index.html;
        expires 1h;
    }

    # Static assets with long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /data/vibes/frontend/dist;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Socket.io (WebSocket upgrade required)
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # App preview proxy (HTTP + WebSocket for Vite/Next.js HMR)
    location /preview/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }
}
