<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #1e1e24;
            color: #e4e4e7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            -webkit-app-region: drag;
            user-select: none;
        }

        .logo-container {
            position: relative;
            margin-bottom: 20px;
        }

        .logo {
            width: 72px;
            height: 72px;
            border-radius: 16px;
            animation: breathe 2.5s ease-in-out infinite;
        }

        .glow {
            position: absolute;
            inset: -10px;
            border-radius: 26px;
            background: radial-gradient(circle, rgba(96, 115, 184, 0.25) 0%, transparent 70%);
            animation: glow-breathe 2.5s ease-in-out infinite;
        }

        .app-name {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(228, 228, 231, 0.7);
            margin-bottom: 28px;
        }

        .progress-container {
            width: 200px;
            margin-bottom: 14px;
        }

        .progress-track {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #607ab8, #7b8ec8);
            border-radius: 2px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .status {
            font-size: 11px;
            color: rgba(228, 228, 231, 0.35);
            text-align: center;
            min-height: 16px;
            letter-spacing: 0.3px;
        }

        .version {
            position: absolute;
            bottom: 10px;
            font-size: 10px;
            color: rgba(228, 228, 231, 0.15);
            letter-spacing: 0.5px;
        }

        @keyframes breathe {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.02);
                opacity: 0.92;
            }
        }

        @keyframes glow-breathe {

            0%,
            100% {
                opacity: 0.4;
                transform: scale(1);
            }

            50% {
                opacity: 0.8;
                transform: scale(1.05);
            }
        }
    </style>
</head>

<body>
    <div class="logo-container">
        <div class="glow"></div>
        <img class="logo" id="logo" src="" alt="Vibes">
    </div>
    <div class="app-name">minube vibes</div>
    <div class="progress-container">
        <div class="progress-track">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>
    <div class="status" id="status">Iniciando...</div>
    <div class="version" id="version"></div>

    <script>
        window.updateSplash = function (step, total, label, version) {
            const pct = Math.round((step / total) * 100);
            document.getElementById('progressBar').style.width = pct + '%';
            document.getElementById('status').textContent = label;
            if (version) {
                document.getElementById('version').textContent = 'v' + version;
            }
        };

        window.setLogoSrc = function (src) {
            document.getElementById('logo').src = src;
        };
    </script>
</body>

</html>
