name: Release Mac (from Linux)
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac-arm64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Configure GitHub token
        run: |
          echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV
          echo "GH_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV

      - name: Install dependencies (host platform)
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── CROSS-PLATFORM BINARY REPLACEMENT ────────────────────────────
      # npm ci installs Linux binaries. We need to replace them with
      # macOS ARM64 binaries for the darwin build.

      - name: Replace dugite git with macOS ARM64 binary
        run: |
          echo "🔄 Downloading macOS ARM64 git binary for dugite..."

          # Read the darwin-arm64 config from dugite's embedded-git.json
          DUGITE_URL=$(node -p "require('./node_modules/dugite/script/embedded-git.json')['darwin-arm64'].url")
          DUGITE_CHECKSUM=$(node -p "require('./node_modules/dugite/script/embedded-git.json')['darwin-arm64'].checksum")

          echo "📦 URL: $DUGITE_URL"
          echo "🔑 Expected checksum: $DUGITE_CHECKSUM"

          # Download the tarball
          TMPFILE=$(mktemp)
          curl -sL "$DUGITE_URL" -o "$TMPFILE"

          # Verify checksum
          ACTUAL_CHECKSUM=$(sha256sum "$TMPFILE" | cut -d' ' -f1)
          if [ "$ACTUAL_CHECKSUM" != "$DUGITE_CHECKSUM" ]; then
            echo "❌ Checksum mismatch! Expected: $DUGITE_CHECKSUM, Got: $ACTUAL_CHECKSUM"
            exit 1
          fi
          echo "✅ Checksum verified"

          # Replace the git directory
          rm -rf node_modules/dugite/git
          mkdir -p node_modules/dugite/git
          tar -xzf "$TMPFILE" -C node_modules/dugite/git
          rm "$TMPFILE"

          echo "✅ Dugite git replaced with macOS ARM64 binary"
          ls node_modules/dugite/git/

      - name: Replace ripgrep with macOS ARM64 binary
        run: |
          echo "🔄 Downloading macOS ARM64 ripgrep binary..."

          # Get the version from ripgrep's postinstall
          RG_VERSION="v15.0.0"
          RG_TARGET="aarch64-apple-darwin"
          RG_ASSET="ripgrep-${RG_VERSION}-${RG_TARGET}.tar.gz"
          RG_URL="https://github.com/microsoft/ripgrep-prebuilt/releases/download/${RG_VERSION}/${RG_ASSET}"

          echo "📦 URL: $RG_URL"

          # Download
          TMPFILE=$(mktemp)
          curl -sL "$RG_URL" -o "$TMPFILE"

          # Replace the bin directory
          rm -rf node_modules/@vscode/ripgrep/bin
          mkdir -p node_modules/@vscode/ripgrep/bin
          tar -xzf "$TMPFILE" -C node_modules/@vscode/ripgrep/bin
          rm "$TMPFILE"

          # Verify the binary exists
          if [ -f "node_modules/@vscode/ripgrep/bin/rg" ]; then
            echo "✅ Ripgrep replaced with macOS ARM64 binary"
            file node_modules/@vscode/ripgrep/bin/rg
          else
            echo "❌ Ripgrep binary not found after extraction"
            ls -la node_modules/@vscode/ripgrep/bin/
            exit 1
          fi

      # ─── BUILD ─────────────────────────────────────────────────────────

      - name: Build Mac ARM64 app
        run: npx electron-forge make --platform darwin --arch arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=6144"

      - name: Verify build output
        run: |
          echo "📋 Build output:"
          find out/make -type f | head -20
          ZIP_FILE=$(find out/make -name "*.zip" | head -1)
          if [ -z "$ZIP_FILE" ]; then
            echo "❌ No .zip file found in out/make"
            exit 1
          fi
          echo "✅ Found: $ZIP_FILE ($(du -h "$ZIP_FILE" | cut -f1))"

      # ─── RELEASE ───────────────────────────────────────────────────────

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: build-${{ github.run_number }}
          name: "Release Build #${{ github.run_number }}"
          draft: false
          prerelease: false
          files: |
            out/make/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload ZIP to BunnyCDN Storage
        if: success()
        run: |
          # Leer versión desde package.json
          VERSION=$(node -p "require('./package.json').version")
          echo "App version: $VERSION"

          # Encontrar el zip generado
          ZIP_FILE=$(find out/make -name "*.zip" | head -1)
          if [ -z "$ZIP_FILE" ]; then
            echo "❌ No se encontró ningún archivo .zip en out/make"
            exit 1
          fi
          echo "📦 Archivo encontrado: $ZIP_FILE"

          # Subir vía API HTTP de BunnyCDN Storage
          curl --request PUT \
               --url "https://storage.bunnycdn.com/minube-vibes/mac/${VERSION}.zip" \
               --header "AccessKey: d77a3ad3-1def-4842-b4b2bda55195-7dd9-4647" \
               --header "Content-Type: application/octet-stream" \
               --data-binary @"$ZIP_FILE" \
               --fail --show-error

          echo "✅ Subido como ${VERSION}.zip a /minube-vibes/mac/"

      - name: Update release.txt on BunnyCDN
        if: success()
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "🔖 Actualizando release.txt con versión: $VERSION"

          echo -n "$VERSION" | curl --request PUT \
               --url "https://storage.bunnycdn.com/minube-vibes/release.txt" \
               --header "AccessKey: d77a3ad3-1def-4842-b4b2bda55195-7dd9-4647" \
               --header "Content-Type: text/plain" \
               --data-binary @- \
               --fail --show-error

          echo "✅ release.txt actualizado a ${VERSION}"
