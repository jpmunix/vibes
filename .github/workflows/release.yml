name: Create Mac release
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [
            #{ id: "linux", image: "ubuntu-latest", command: "npm run distribute" },
#            {
#              id: "macos-intel",
#              image: "macos-13", # Intel runner
#              command: "npx electron-forge make --platform darwin --arch x64",
#            },
            {
              id: "macos-arm64",
              image: "macos-latest", # Apple Silicon runner (M1)
              command: "npx electron-forge make --platform darwin --arch arm64",
            },
          ]
    runs-on: ${{ matrix.os.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Configure GitHub token for package downloads
        run: |
          # Set GitHub token for packages that download from GitHub releases
          # This is used by @vscode/ripgrep and other packages
          echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV
          # Alternative env vars that some packages use
          echo "GH_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV

      - name: Install libvips (Linux only)
        if: matrix.os.image == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-dev

      - name: Install dependencies
        # Asegúrate de que package-lock.json esté en tu repo para usar 'ci'
        run: npm ci
        env:
          # Use GitHub token to avoid rate limiting when downloading binaries
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Sharp with native libraries for macOS
        if: startsWith(matrix.os.id, 'macos')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Detectar arquitectura del runner de GitHub Actions
          RUNNER_ARCH=$(uname -m)
          echo "Runner architecture: $RUNNER_ARCH"
          echo "Building for: ${{ matrix.os.id }}"

          # Limpiar cache de npm y Sharp completamente
          npm cache clean --force
          rm -rf node_modules/sharp node_modules/.bin/sharp* 2>/dev/null || true
          rm -rf node_modules/@img 2>/dev/null || true

          # Para @xenova/transformers que tiene su propia copia de Sharp
          rm -rf node_modules/@xenova/transformers/node_modules/sharp 2>/dev/null || true

          # Reinstalar Sharp FORZANDO descarga de binarios nativos según arquitectura del build
          if [[ "${{ matrix.os.id }}" == "macos-arm64" ]]; then
            echo "Installing Sharp for macOS ARM64..."
            npm install --no-save --force --platform=darwin --arch=arm64 sharp@latest
          else
            echo "Installing Sharp for macOS x64 (Intel)..."
            npm install --no-save --force --platform=darwin --arch=x64 sharp@latest
          fi

          # Verificar instalación de Sharp principal
          echo ""
          echo "=== Checking main Sharp installation ==="
          if [ -d "node_modules/sharp" ]; then
            echo "✓ Sharp installed"
            ls -la node_modules/sharp/ | head -20

            if [ -d "node_modules/sharp/vendor" ]; then
              echo "✓ Sharp vendor directory found"
              find node_modules/sharp/vendor -name "*.dylib" -o -name "*.so" | head -10
            else
              echo "✗ Sharp vendor directory NOT found"
              echo "Attempting to download Sharp binaries manually..."
              cd node_modules/sharp && npm install --ignore-scripts=false && cd ../..
            fi
          else
            echo "✗ Sharp not installed"
            exit 1
          fi

          # Reinstalar @xenova/transformers para que use el Sharp correcto
          echo ""
          echo "=== Reinstalling @xenova/transformers to use correct Sharp ==="
          npm uninstall @xenova/transformers
          npm install --no-save @xenova/transformers

          # Verificación final
          echo ""
          echo "=== Final verification ==="
          SHARP_VENDOR=$(find node_modules -path "*/sharp/vendor" -type d 2>/dev/null | head -1)
          if [ -n "$SHARP_VENDOR" ]; then
            echo "✓ Found Sharp vendor at: $SHARP_VENDOR"
            find "$SHARP_VENDOR" -name "*.dylib" | head -5
          else
            echo "✗ ERROR: No Sharp vendor directory found anywhere"
            echo "Searching for Sharp installations..."
            find node_modules -name "sharp" -type d
            exit 1
          fi

      - name: Rebuild native modules for Electron
        run: npm run rebuild

      - name: Build App (${{ matrix.os.id }})
        run: ${{ matrix.os.command }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ""
          APPLE_PASSWORD: ""
          APPLE_TEAM_ID: ""
          # Los 6GB de RAM son clave para la IA
          NODE_OPTIONS: "--max-old-space-size=6144"

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        # Solo se ejecuta si el build anterior tuvo éxito
        if: success()
        with:
          tag_name: build-${{ github.run_number }}
          name: "Release Build #${{ github.run_number }}"
          draft: false
          prerelease: false
          files: |
            out/make/**/*.deb
            out/make/**/*.zip
            out/make/**/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
