name: Create Mac release
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [
            #{ id: "linux", image: "ubuntu-latest", command: "npm run distribute" },
#            {
#              id: "macos-intel",
#              image: "macos-13", # Intel runner
#              command: "npx electron-forge make --platform darwin --arch x64",
#            },
            {
              id: "macos-arm64",
              image: "macos-latest", # Apple Silicon runner (M1)
              command: "npx electron-forge make --platform darwin --arch arm64",
            },
          ]
    runs-on: ${{ matrix.os.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Configure GitHub token for package downloads
        run: |
          # Set GitHub token for packages that download from GitHub releases
          # This is used by @vscode/ripgrep and other packages
          echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV
          # Alternative env vars that some packages use
          echo "GH_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV

      - name: Install libvips (Linux only)
        if: matrix.os.image == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-dev

      - name: Install dependencies
        # Asegúrate de que package-lock.json esté en tu repo para usar 'ci'
        run: npm ci
        env:
          # Use GitHub token to avoid rate limiting when downloading binaries
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


      - name: Build App (${{ matrix.os.id }})
        run: ${{ matrix.os.command }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ""
          APPLE_PASSWORD: ""
          APPLE_TEAM_ID: ""
          # Los 6GB de RAM son clave para la IA
          NODE_OPTIONS: "--max-old-space-size=6144"

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        # Solo se ejecuta si el build anterior tuvo éxito
        if: success()
        with:
          tag_name: build-${{ github.run_number }}
          name: "Release Build #${{ github.run_number }}"
          draft: false
          prerelease: false
          files: |
            out/make/**/*.deb
            out/make/**/*.zip
            out/make/**/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload ZIP to BunnyCDN Storage
        if: success() && startsWith(matrix.os.id, 'macos')
        run: |
          # Leer versión desde package.json
          VERSION=$(node -p "require('./package.json').version")
          echo "App version: $VERSION"

          # Encontrar el zip generado
          ZIP_FILE=$(find out/make -name "*.zip" | head -1)
          if [ -z "$ZIP_FILE" ]; then
            echo "❌ No se encontró ningún archivo .zip en out/make"
            exit 1
          fi
          echo "📦 Archivo encontrado: $ZIP_FILE"

          # Subir vía API HTTP de BunnyCDN Storage
          curl --request PUT \
               --url "https://storage.bunnycdn.com/minube-vibes/mac/${VERSION}.zip" \
               --header "AccessKey: d77a3ad3-1def-4842-b4b2bda55195-7dd9-4647" \
               --header "Content-Type: application/octet-stream" \
               --data-binary @"$ZIP_FILE" \
               --fail --show-error

          echo "✅ Subido como ${VERSION}.zip a /minube-vibes/mac/"

      - name: Update release.txt on BunnyCDN
        if: success() && startsWith(matrix.os.id, 'macos')
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "🔖 Actualizando release.txt con versión: $VERSION"

          echo -n "$VERSION" | curl --request PUT \
               --url "https://storage.bunnycdn.com/minube-vibes/release.txt" \
               --header "AccessKey: d77a3ad3-1def-4842-b4b2bda55195-7dd9-4647" \
               --header "Content-Type: text/plain" \
               --data-binary @- \
               --fail --show-error

          echo "✅ release.txt actualizado a ${VERSION}"
