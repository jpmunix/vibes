name: Create Release (Linux & Mac)
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [
            #{ id: "linux", image: "ubuntu-latest", command: "npm run distribute" },
            {
              id: "macos",
              image: "macos-latest",
              command: "npx electron-forge make --platform darwin --arch x64",
            },
          ]
    runs-on: ${{ matrix.os.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install libvips (Linux only)
        if: matrix.os.image == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-dev

      - name: Install dependencies
        # Asegúrate de que package-lock.json esté en tu repo para usar 'ci'
        run: npm ci

      - name: Install Sharp with native libraries for macOS
        if: matrix.os.id == 'macos'
        run: |
          # Detectar arquitectura del runner de GitHub Actions
          RUNNER_ARCH=$(uname -m)
          echo "Runner architecture: $RUNNER_ARCH"

          # Reinstalar Sharp con todas las dependencias nativas
          npm uninstall sharp
          npm install --no-save --foreground-scripts sharp

          # Verificar que vendor/ existe y contiene libvips
          if [ -d "node_modules/sharp/vendor" ]; then
            echo "✓ Sharp vendor directory found"
            find node_modules/sharp/vendor -name "*.dylib" || echo "WARNING: No .dylib files found"
          else
            echo "ERROR: Sharp vendor directory not found"
            exit 1
          fi

      - name: Rebuild native modules for Electron
        run: npm run rebuild

      - name: Build App (${{ matrix.os.id }})
        run: ${{ matrix.os.command }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ""
          APPLE_PASSWORD: ""
          APPLE_TEAM_ID: ""
          # Los 6GB de RAM son clave para la IA
          NODE_OPTIONS: "--max-old-space-size=6144"

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        # Solo se ejecuta si el build anterior tuvo éxito
        if: success()
        with:
          tag_name: build-${{ github.run_number }}
          name: "Release Build #${{ github.run_number }}"
          draft: false
          prerelease: false
          files: |
            out/make/**/*.deb
            out/make/**/*.zip
            out/make/**/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
